<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="icon" type="image/png" href="imagenes/logo.png">
    <link rel="stylesheet" href="CSS/citas.css">
    <title>MiPatita</title>
</head>
<body style="background: #6dd6e9;">
    <nav class="navbar navbar-expand-lg cabecera navbar-dark text-bg-dark fixed-top">
        <div class="container-fluid">
            <!-- Logo -->
            <a class="navbar-brand" href="index.html">
            <img src="imagenes/logo.png" alt="Logo" width="50" height="50" class="d-inline-block align-text-top">
            Mi patita
            </a>
            <!-- Botón para moviles -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <!-- Links -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="contactos.html">Contactanos</a></li>
                    <li class="nav-item"><a class="nav-link active" href="nosotros.html">Nosotros</a></li>
                    <li class="nav-item"><a class="nav-link active" href="servicios.html">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link active" href="citas.html">Citas</a></li>
                    <li class="nav-item"><a class="nav-link active" href="carrito.html">Carrito</a></li>
                    <li class="nav-item"><a class="nav-link active" href="staff.html">Staff</a></li>
                    <li class="nav-item"><a class="nav-link active" href="productos.html">Productos</a></li>
                    <!-- log in -->
                    <li class="nav-item">
                        <!-- Button to Open the Modal -->
                        <button type="button" class="btn btn-secondary ms-3" data-bs-toggle="modal" data-bs-target="#myModal">
                            <img src="imagenes/iconos/login.svg" alt="Icono" width="20" height="20" class="me-2">
                            Log in
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- The Modal -->
    <div class="modal" id="myModal">
        <div class="modal-dialog">
            <div class="modal-content fondo_session">
                <!-- Modal Header -->
                <div class="modal-header">
                    <h4 class="modal-title">Crea tu cuenta</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <!-- Modal body -->
                <div class="modal-body">
                    <form action="index.html">
                        <!-- Correo -->
                        <div class="mb-3">
                            <label for="correo" class="form-label">Ingrese su correo</label>
                            <input type="email" class="form-control" id="correo" placeholder="example@gmail.com" required>
                        </div>

                        <!-- Contraseña -->
                        <div class="mb-3">
                            <label for="contraseña" class="form-label">Ingrese su contraseña</label>
                            <input type="password" class="form-control" id="contraseña" placeholder="Ingrese su contraseña" required>
                        </div>

                        <!-- Confirmar contraseña -->
                        <div class="mb-3">
                            <label for="Confirmar" class="form-label">Confirma tu contraseña</label>
                            <input type="password" class="form-control" id="Confirmar" placeholder="Confirmar contraseña" required>
                        </div>

                        <!-- Nombre de usuario -->
                        <div class="mb-3">
                            <label for="nombre" class="form-label">Ingrese un nombre de usuario</label>
                            <input type="text" class="form-control" id="nombre" placeholder="Admin..." required>
                        </div>

                        <!-- Botón -->
                        <div class="d-grid login">
                            <input type="submit" class="btn btn-primary " value="Log in">
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="pt-5 mt-2"></div>
    <section class="container my-5 shadow-lg rounded overflow-hidden bg-white mt-5">
        <div class="row g-0">
            <div class="col-md-4 d-none d-md-block">
                <div class="h-100 m-4" style="background: url('imagenes/cita.jpeg') center/cover no-repeat; min-height: 300px;">
                </div>
            </div>

            <div class="col-md-8 p-4 p-lg-5">
                <h1 class="display-6 mb-3" style="color: #00bcd4;">Agendar una cita</h1>
                <p class="text-muted fst-italic mb-4">
                    “Agenda la cita de tu mascota y uno de nuestros veterinarios se pondrá en contacto contigo para confirmarla.”
                </p>

                <form action="" method="get" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Nombre del dueño:</label>
                        <input type="text" name="dueño" class="form-control" placeholder="Ej. Juan Pérez">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Nombre de la mascota:</label>
                        <input type="text" name="mascota" class="form-control" placeholder="Nombre de tu engreído">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Especie:</label>
                        <select name="especie" class="form-select">
                            <option selected>Elegir...</option>
                            <option>Perro</option>
                            <option>Gato</option>
                            <option>Ave</option>
                            <option>Otro</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Teléfono:</label>
                        <input type="number" name="telefono" class="form-control" placeholder="987 654 321">
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-bold">Fecha de la cita:</label>
                        <input type="date" name="fecha" class="form-control">
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-bold">Motivo de la consulta:</label>
                        <textarea name="motivo" class="form-control" rows="3" placeholder="Cuéntanos brevemente el motivo..."></textarea>
                    </div>

                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-lg w-100 text-white shadow-sm" style="background-color: #00bcd4; border: none;">
                            Reservar cita ahora
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>
    <div class="container-fluid pie text-bg-dark pie pt-5 pb-5 text-center mt-5">
        <footer>
            <p>@todos los derrechos resevados - 14 de abril del 2026</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
